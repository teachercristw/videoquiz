<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Video Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Variables - Sophisticated Dark Theme */
        :root {
            --bg-color: #0f172a;        /* Deep Slate / Black */
            --card-bg: #1e293b;         /* Dark gray for panels */
            --text-main: #f8fafc;       /* Off-white text */
            --text-muted: #94a3b8;      /* Muted gray text */
            --border-color: #334155;    /* Subtle dark borders */
            --font-main: 'Nunito', sans-serif;
            
            /* Distinct Button Colors */
            --btn-play: #10b981;        /* Green */
            --btn-pause: #f59e0b;       /* Amber */
            --btn-rw: #8b5cf6;          /* Purple */
            --btn-fw: #06b6d4;          /* Cyan */
            --btn-finish: #6366f1;      /* Indigo */
            --btn-action: #3b82f6;      /* Blue */
            --btn-danger: #ef4444;      /* Red */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }

        .hidden { display: none !important; }
        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }

        /* Containers */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .teacher-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; background: var(--card-bg); padding: 15px 30px;
            border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); flex-wrap: wrap; gap: 10px;
        }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.5px; }
        .score-board { font-size: 1.4rem; font-weight: 800; color: #fbbf24; display: flex; align-items: center; gap: 15px; }

        /* Video Player */
        .video-container {
            position: relative; width: 100%; background: #000;
            border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
        }
        video, #youtube-player, #t-youtube-player { width: 100%; height: 100%; border: none; }

        /* Controls */
        .controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .control-group { display: flex; gap: 8px; background: #1e293b; padding: 8px; border-radius: 12px; border: 1px solid var(--border-color); }

        .btn {
            font-family: inherit; font-size: 1.1rem; font-weight: 800;
            padding: 10px 20px; border: none; border-radius: 8px; color: #fff;
            cursor: pointer; transition: all 0.15s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25); text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Colored Buttons */
        .btn-play { background-color: var(--btn-play); }
        .btn-play:hover { background-color: #059669; }
        
        .btn-pause { background-color: var(--btn-pause); }
        .btn-pause:hover { background-color: #d97706; }
        
        .btn-rw { background-color: var(--btn-rw); }
        .btn-rw:hover { background-color: #7c3aed; }
        
        .btn-fw { background-color: var(--btn-fw); }
        .btn-fw:hover { background-color: #0891b2; }
        
        .btn-finish { background-color: var(--btn-finish); }
        .btn-finish:hover { background-color: #4f46e5; }
        
        .btn-action { background-color: var(--btn-action); }
        .btn-action:hover { background-color: #2563eb; }

        .btn-danger { background-color: var(--btn-danger); }
        .btn-danger:hover { background-color: #dc2626; }
        
        .btn-gray { background-color: #64748b; }
        .btn-gray:hover { background-color: #475569; }

        .btn.small { font-size: 0.95rem; padding: 8px 16px; box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
        .btn.micro { font-size: 0.85rem; padding: 6px 10px; box-shadow: 0 2px 0 rgba(0,0,0,0.25); }

        /* Quiz Panel */
        .quiz-panel {
            background: var(--card-bg); padding: 30px; border-radius: 12px;
            margin-top: 20px; border: 1px solid var(--btn-fw);
            text-align: center; animation: slideDown 0.3s ease-out;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .quiz-panel h2 { font-size: 1.6rem; margin-bottom: 10px; color: #fff; }
        .points-indicator { display: block; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; font-size: 1rem; }

        /* MCQ Grid */
        .mcq-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .option-btn {
            font-size: 1.1rem; padding: 15px; font-weight: 800;
            border: 2px solid var(--border-color); background: #334155; color: var(--text-main);
            border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: #475569; border-color: #64748b; }
        .option-btn.correct { background: var(--btn-play); color: white; border-color: var(--btn-play); }
        .option-btn.wrong { background: var(--btn-danger); color: white; border-color: var(--btn-danger); }

        .text-answer-input {
            width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid var(--border-color);
            background: #0f172a; color: #fff; border-radius: 10px; margin-bottom: 15px; 
            font-family: inherit; text-align: center;
        }
        .text-answer-input:focus { outline: none; border-color: var(--btn-action); }

        .feedback-text { font-size: 1.3rem; font-weight: 800; margin-top: 20px; }
        .hint-text { margin-top: 15px; font-size: 1.1rem; font-weight: 600; color: #fef08a; background: rgba(234, 179, 8, 0.2); padding: 10px; border-radius: 8px; border: 1px solid #eab308; }

        /* Teacher Dashboard Layout */
        .teacher-layout { display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }
        @media (max-width: 900px) { .teacher-layout { grid-template-columns: 1fr; } }

        .sticky-panel { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 20px; }
        .teacher-panel { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .teacher-panel label { display: block; font-weight: 600; margin-top: 10px; font-size: 0.95rem; color: var(--text-muted); }
        .teacher-panel input[type="text"], .teacher-panel input[type="number"], .teacher-panel input[type="password"], .teacher-panel select {
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color);
            background: #0f172a; color: #fff; border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        
        .t-mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed var(--border-color);}
        .t-mcq-item { display: flex; align-items: center; gap: 10px; }
        .t-mcq-item input[type="radio"] { transform: scale(1.3); cursor: pointer; }

        .q-box { border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; margin-bottom: 20px; background: var(--card-bg); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .q-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 16px; width: 90%; max-width: 450px; text-align: center; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }

        .gear-icon {
            position: fixed; bottom: 20px; right: 20px; background: var(--card-bg); border: 1px solid var(--border-color); color: #fff;
            font-size: 1.5rem; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; opacity: 0.3; z-index: 500; transition: opacity 0.2s;
        }
        .gear-icon:hover { opacity: 1; }

        .toggle-switch { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        .toggle-switch input { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <main id="student-view" class="container">
        
        <header class="app-header">
            <h1 id="app-title">Video Lesson</h1>
            <div class="score-board">
                <span>Score: <span id="score-display">0</span> Pts</span>
                <button id="btn-finish" class="btn btn-finish small hidden">🏁 Finish Lesson</button>
            </div>
        </header>

        <div class="video-container">
            <video id="html5-player" class="hidden" playsinline></video>
            <div id="youtube-player" class="hidden"></div>
        </div>

        <div id="student-controls" class="controls">
            <div id="group-rewind" class="control-group hidden">
                <button class="btn btn-rw micro" onclick="skipTime(-10)">⏪ -10s</button>
                <button class="btn btn-rw micro" onclick="skipTime(-5)">⏪ -5s</button>
                <button class="btn btn-rw micro" onclick="skipTime(-2)">⏪ -2s</button>
            </div>
            
            <div id="group-playpause" class="control-group hidden" style="background: transparent; border: none; padding: 0;">
                <button id="btn-play" class="btn btn-play">▶️ Play</button>
                <button id="btn-pause" class="btn btn-pause">⏸️ Pause</button>
            </div>

            <div id="group-forward" class="control-group hidden">
                <button class="btn btn-fw micro" onclick="skipTime(2)">+2s ⏩</button>
                <button class="btn btn-fw micro" onclick="skipTime(5)">+5s ⏩</button>
                <button class="btn btn-fw micro" onclick="skipTime(10)">+10s ⏩</button>
            </div>
        </div>

        <div id="quiz-area" class="quiz-panel hidden">
            <h2 id="quiz-question">Question?</h2>
            <span class="points-indicator">⏱️ Answer quickly for more points! (Max: <span id="quiz-max-points">10</span> Pts)</span>
            
            <div id="quiz-answer-area"></div>
            
            <p id="quiz-feedback" class="feedback-text hidden"></p>
            <p id="quiz-hint" class="hint-text hidden"></p>
            <button id="btn-hint" class="btn btn-pause small mt-20 hidden">💡 Need a Hint?</button>
        </div>

    </main>

    <div id="save-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>🎉 Lesson Complete!</h2>
            <p style="margin-top:10px; font-size:1.2rem; color: var(--text-muted);">Final Score: <strong id="final-score-display" style="color:#fbbf24;">0</strong> Pts</p>
            
            <div style="text-align: left; margin-top: 20px;">
                <label style="font-weight:bold; color:var(--text-muted);">Student Name:</label>
                <input type="text" id="student-name" placeholder="E.g. John Doe" class="text-answer-input" style="padding:10px; margin-bottom:10px; text-align:left;">
                
                <label style="font-weight:bold; color:var(--text-muted);">Class / Section:</label>
                <input type="text" id="student-class" placeholder="E.g. Math 101" class="text-answer-input" style="padding:10px; text-align:left;">
            </div>

            <div class="mt-20 flex-between" style="gap:10px;">
                <button id="btn-save-drive" class="btn btn-action" style="flex:1;">💾 Submit Data</button>
                <button id="btn-cancel-save" class="btn btn-gray">Back</button>
            </div>
            <p id="save-status" class="hidden" style="margin-top:15px; color:var(--btn-play); font-weight:bold;"></p>
        </div>
    </div>

    <div id="pin-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Teacher Dashboard</h2>
            <input type="password" id="pin-input" placeholder="Enter PIN Code" style="width:100%; padding:12px; margin-top:15px; text-align:center; font-size:1.2rem; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#fff;">
            <div class="mt-20 flex-between" style="gap:10px;">
                <button id="btn-submit-pin" class="btn btn-action" style="flex:1;">Unlock</button>
                <button id="btn-cancel-pin" class="btn btn-gray">Cancel</button>
            </div>
            <p id="pin-error" class="hidden" style="color:var(--btn-danger); margin-top:15px;">Incorrect PIN!</p>
        </div>
    </div>

    <button id="btn-teacher-login" class="gear-icon">⚙️</button>

    <div id="teacher-view" class="teacher-container hidden">
        <header class="app-header">
            <h1>⚙️ Teacher Settings</h1>
            <button id="btn-exit-teacher" class="btn btn-action">Save & Return to Lesson</button>
        </header>

        <div class="teacher-layout">
            
            <div class="sticky-panel">
                <div class="teacher-panel">
                    <h3 style="margin-bottom:10px; color:#fff;">1. Video Source</h3>
                    <label>Video Type:</label>
                    <select id="t-video-type">
                        <option value="youtube">YouTube</option>
                        <option value="local">MP4 File Link</option>
                    </select>
                    <label>YouTube ID or MP4 Link:</label>
                    <input type="text" id="t-video-source" placeholder="e.g. dQw4w9WgXcQ">
                    <button class="btn btn-gray small mt-10" onclick="loadTeacherVideoPreview()" style="width:100%;">🔄 Load Preview</button>
                    
                    <div class="video-container mt-10">
                        <video id="t-html5-player" class="hidden" controls></video>
                        <div id="t-youtube-player" class="hidden"></div>
                    </div>
                </div>

                <div class="teacher-panel">
                    <h3 style="color:#fff;">2. Controls & Data</h3>
                    
                    <div class="toggle-switch">
                        <label style="margin:0;">Allow Play & Pause</label>
                        <input type="checkbox" id="t-ctrl-play">
                    </div>
                    <div class="toggle-switch">
                        <label style="margin:0;">Allow Rewind (Back)</label>
                        <input type="checkbox" id="t-ctrl-rewind">
                    </div>
                    <div class="toggle-switch">
                        <label style="margin:0;">Allow Fast-Forward</label>
                        <input type="checkbox" id="t-ctrl-forward">
                    </div>

                    <label class="mt-10">Google Apps Script Webhook URL:</label>
                    <input type="text" id="t-webhook" placeholder="https://script.google.com/...">
                </div>

                <div class="teacher-panel">
                    <h3 style="color:#fff;">3. Security & Backup</h3>
                    <label>Dashboard PIN:</label>
                    <input type="text" id="t-pin">
                    
                    <hr style="margin: 15px 0; border: 0; border-top: 1px dashed var(--border-color);">

                    <label>Backup / Restore JSON Data:</label>
                    <div class="flex-between mt-10" style="gap:10px;">
                        <button id="btn-export-json" class="btn btn-action small" style="flex:1;">📥 Export</button>
                        <label for="import-json" class="btn btn-gray small" style="flex:1; text-align:center; display:block; cursor:pointer;">📤 Import</label>
                        <input type="file" id="import-json" accept=".json" class="hidden">
                        <a id="download-anchor" class="hidden"></a>
                    </div>
                </div>
            </div>

            <div class="teacher-panel" style="background: transparent; border: none; padding: 0;">
                <div class="flex-between" style="background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px;">
                    <h3 style="color:#fff;">4. Questions Manager</h3>
                    <button id="btn-add-question" class="btn btn-play small">➕ Add Question</button>
                </div>
                
                <div id="questions-list">
                    </div>
            </div>

        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const AUTO_FETCH_URL = ""; 

        const DEFAULT_DATA = {
            pin: "1234",
            videoSource: "dQw4w9WgXcQ", 
            videoType: "youtube",
            webhookUrl: "",
            controls: { playPause: true, rewind: true, forward: true },
            questions: [
                {
                    type: "mcq",
                    timestamp: 5,
                    maxPoints: 10,
                    text: "What color is the sky?",
                    options: ["Green", "Blue", "Red", "Yellow"],
                    correctAnswer: 1, 
                    hint: "Look up!"
                }
            ]
        };

        let appData = JSON.parse(localStorage.getItem('quizAppDataKids')) || DEFAULT_DATA;
        
        function sanitizeData() {
            if(!appData.controls) appData.controls = { playPause: true, rewind: true, forward: true };
            if(appData.webhookUrl === undefined) appData.webhookUrl = "";
            appData.questions.forEach(q => { 
                q.timestamp = Number(q.timestamp) || 0; // Fixes string bugs
                q.maxPoints = Number(q.maxPoints) || 10;
                q.correctAnswer = (q.type === 'mcq') ? Number(q.correctAnswer) : q.correctAnswer;
            });
        }
        sanitizeData();

        function saveToLocalStorage() { localStorage.setItem('quizAppDataKids', JSON.stringify(appData)); }

        function syncDashboardToAppData() {
            appData.pin = document.getElementById('t-pin').value || appData.pin;
            appData.videoType = document.getElementById('t-video-type').value;
            appData.videoSource = document.getElementById('t-video-source').value;
            appData.webhookUrl = document.getElementById('t-webhook').value;
            
            appData.controls.playPause = document.getElementById('t-ctrl-play').checked;
            appData.controls.rewind = document.getElementById('t-ctrl-rewind').checked;
            appData.controls.forward = document.getElementById('t-ctrl-forward').checked;
        }

        // State
        let currentScore = 0;
        let answeredQuestions = new Set(); 
        let timeCheckerInterval;
        let activeQuestionIndex = -1;
        let questionAppearedTime = 0; 
        let initPending = true;

        // Players
        let ytPlayer = null;
        let ytTeacherPlayer = null;
        let isYtApiReady = false;
        const html5Player = document.getElementById('html5-player');
        const tHtml5Player = document.getElementById('t-html5-player');

        // ==========================================
        // INIT LOGIC
        // ==========================================
        window.onload = async () => { 
            const targetUrl = AUTO_FETCH_URL;
            if (targetUrl) {
                try {
                    const response = await fetch(targetUrl);
                    if (response.ok) {
                        appData = await response.json();
                        sanitizeData();
                        saveToLocalStorage();
                    }
                } catch (e) { console.error("Auto-fetch failed", e); }
            }
            initPending = false;
            
            if (appData.videoType === 'local') initVideoPlayer(); 
            else if (appData.videoType === 'youtube' && isYtApiReady) initVideoPlayer();
        };

        function applyStudentControlsUI() {
            document.getElementById('group-playpause').classList.toggle('hidden', !appData.controls.playPause);
            document.getElementById('group-rewind').classList.toggle('hidden', !appData.controls.rewind);
            document.getElementById('group-forward').classList.toggle('hidden', !appData.controls.forward);
            
            if (appData.videoType === 'local') {
                html5Player.controls = appData.controls.playPause; 
            }
        }

        // ==========================================
        // VIDEO LOGIC
        // ==========================================
        function onYouTubeIframeAPIReady() {
            isYtApiReady = true;
            if (appData.videoType === 'youtube' && !initPending) initVideoPlayer();
        }

        function initVideoPlayer() {
            clearInterval(timeCheckerInterval);
            answeredQuestions.clear();
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('btn-finish').classList.add('hidden'); // Hide finish button at start
            
            html5Player.classList.add('hidden');
            document.getElementById('youtube-player').classList.add('hidden');

            applyStudentControlsUI();

            if (appData.videoType === 'local') {
                if (ytPlayer) ytPlayer.stopVideo();
                html5Player.src = appData.videoSource;
                html5Player.classList.remove('hidden');
            } else if (appData.videoType === 'youtube' && isYtApiReady) {
                html5Player.pause();
                document.getElementById('youtube-player').classList.remove('hidden');

                if (ytPlayer) {
                    ytPlayer.loadVideoById(appData.videoSource);
                } else {
                    ytPlayer = new YT.Player('youtube-player', {
                        videoId: appData.videoSource,
                        playerVars: { 'controls': 0, 'rel': 0, 'playsinline': 1, 'disablekb': 1 }
                    });
                }
            }
            // Runs rapidly (every 250ms) to ensure no questions are missed
            timeCheckerInterval = setInterval(checkVideoTime, 250);
        }

        function getCurrentTime() { return appData.videoType === 'local' ? html5Player.currentTime : (ytPlayer?.getCurrentTime() || 0); }
        function playVideo() { appData.videoType === 'local' ? html5Player.play() : ytPlayer?.playVideo(); }
        function pauseVideo() { appData.videoType === 'local' ? html5Player.pause() : ytPlayer?.pauseVideo(); }

        window.skipTime = function(seconds) {
            const currentTime = getCurrentTime();
            let newTime = currentTime + seconds;

            if (seconds > 0) {
                let upcomingQs = appData.questions
                    .map((q, idx) => ({ ...q, originalIndex: idx }))
                    .filter(q => q.timestamp > currentTime && !answeredQuestions.has(q.originalIndex))
                    .sort((a, b) => a.timestamp - b.timestamp);

                if (upcomingQs.length > 0) {
                    const nextQTimestamp = upcomingQs[0].timestamp;
                    if (newTime >= nextQTimestamp) {
                        newTime = nextQTimestamp; // Snap directly to the question
                    }
                }
            }

            if (appData.videoType === 'local') {
                html5Player.currentTime = Math.max(0, newTime);
            } else if (appData.videoType === 'youtube' && ytPlayer) {
                ytPlayer.seekTo(Math.max(0, newTime), true);
            }
        }

        document.getElementById('btn-play').addEventListener('click', playVideo);
        document.getElementById('btn-pause').addEventListener('click', pauseVideo);

        // ==========================================
        // QUIZ LOGIC
        // ==========================================
        function checkVideoTime() {
            const currentTime = getCurrentTime();
            
            // Look for any unanswered question where the current video time is equal to or past the timestamp
            let passedQuestions = appData.questions
                .map((q, index) => ({ ...q, originalIndex: index }))
                .filter(q => currentTime >= q.timestamp && !answeredQuestions.has(q.originalIndex))
                .sort((a, b) => a.timestamp - b.timestamp); // Prioritize the earliest missed question

            if (passedQuestions.length > 0 && activeQuestionIndex === -1) {
                triggerQuiz(passedQuestions[0], passedQuestions[0].originalIndex);
            }
        }

        function triggerQuiz(q, index) {
            pauseVideo(); 
            activeQuestionIndex = index;
            questionAppearedTime = Date.now(); 
            
            const area = document.getElementById('quiz-area');
            area.classList.remove('hidden');
            
            document.getElementById('quiz-question').textContent = q.text;
            document.getElementById('quiz-max-points').textContent = q.maxPoints;
            document.getElementById('quiz-feedback').classList.add('hidden');
            
            const hintBtn = document.getElementById('btn-hint');
            const hintTxt = document.getElementById('quiz-hint');
            hintTxt.classList.add('hidden');
            
            if(q.hint) {
                hintBtn.classList.remove('hidden');
                hintTxt.textContent = `💡 ${q.hint}`;
            } else { hintBtn.classList.add('hidden'); }

            const answerArea = document.getElementById('quiz-answer-area');
            answerArea.innerHTML = ''; 

            if (q.type === 'mcq') {
                const grid = document.createElement('div');
                grid.className = 'mcq-grid';
                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(idx, btn, q.correctAnswer);
                    grid.appendChild(btn);
                });
                answerArea.appendChild(grid);
            } else {
                answerArea.innerHTML = `
                    <input type="text" id="student-text-input" class="text-answer-input" placeholder="Type your answer here...">
                    <button class="btn btn-play" onclick="checkTextAnswer(this)">Submit Answer</button>
                `;
            }
        }

        document.getElementById('btn-hint').onclick = () => document.getElementById('quiz-hint').classList.remove('hidden');

        function calculateEarnedPoints() {
            const q = appData.questions[activeQuestionIndex];
            const timeTakenInSeconds = (Date.now() - questionAppearedTime) / 1000;
            let earned = q.maxPoints;
            if (timeTakenInSeconds > 5) {
                const penalty = Math.floor((timeTakenInSeconds - 5) / 3);
                earned = q.maxPoints - penalty;
            }
            return Math.max(1, earned); 
        }

        function checkAnswer(selectedIndex, btnClicked, correctIndex) {
            const grid = document.querySelector('.mcq-grid');
            Array.from(grid.children).forEach(b => b.style.pointerEvents = 'none'); 
            if (selectedIndex === correctIndex) handleCorrect(btnClicked);
            else handleWrong(btnClicked, grid.children[correctIndex]);
        }

        function checkTextAnswer(btnElement) {
            const ans = document.getElementById('student-text-input').value.trim();
            const q = appData.questions[activeQuestionIndex];
            if (q.type === 'essay' && ans.length > 0) handleCorrect(null);
            else if (q.type === 'identification' && ans.toLowerCase() === q.correctAnswer.toLowerCase()) handleCorrect(null);
            else handleWrong(null, null);
        }

        function handleCorrect(btnClicked) {
            if(btnClicked) btnClicked.classList.add('correct');
            const earnedPoints = calculateEarnedPoints();
            currentScore += earnedPoints;
            document.getElementById('score-display').textContent = currentScore;
            
            const fb = document.getElementById('quiz-feedback');
            fb.textContent = `✨ Correct! You earned +${earnedPoints} Points! ✨`;
            fb.style.color = "var(--btn-play)";
            fb.classList.remove('hidden');

            setTimeout(closeQuiz, 2000);
        }

        function handleWrong(btnClicked, correctBtn) {
            if(btnClicked) btnClicked.classList.add('wrong');
            const fb = document.getElementById('quiz-feedback');
            fb.textContent = "Oops! Incorrect. 0 Points.";
            fb.style.color = "var(--btn-danger)";
            fb.classList.remove('hidden');
            if(correctBtn) correctBtn.classList.add('correct'); 
            setTimeout(closeQuiz, 2500);
        }

        function closeQuiz() {
            answeredQuestions.add(activeQuestionIndex);
            activeQuestionIndex = -1;
            document.getElementById('quiz-area').classList.add('hidden');
            
            // Show Finish Button only if all questions are completed
            if (answeredQuestions.size === appData.questions.length && appData.questions.length > 0) {
                document.getElementById('btn-finish').classList.remove('hidden');
            }
            
            playVideo();
        }

        // ==========================================
        // FINISH & SAVE LOGIC
        // ==========================================
        document.getElementById('btn-finish').onclick = () => {
            pauseVideo();
            document.getElementById('final-score-display').textContent = currentScore;
            document.getElementById('save-modal').classList.remove('hidden');
            document.getElementById('save-status').classList.add('hidden');
        };

        document.getElementById('btn-cancel-save').onclick = () => document.getElementById('save-modal').classList.add('hidden');

        document.getElementById('btn-save-drive').onclick = async () => {
            const sName = document.getElementById('student-name').value.trim();
            const sClass = document.getElementById('student-class').value.trim();
            const statusLabel = document.getElementById('save-status');
            
            if(!sName || !sClass) {
                statusLabel.textContent = "Please enter Name and Class!";
                statusLabel.style.color = "var(--btn-danger)";
                statusLabel.classList.remove('hidden');
                return;
            }

            statusLabel.style.color = "var(--btn-play)";
            statusLabel.textContent = "Saving to Server...";
            statusLabel.classList.remove('hidden');

            const payload = {
                name: sName,
                className: sClass,
                score: currentScore,
                date: new Date().toLocaleString()
            };

            if (appData.webhookUrl) {
                try {
                    await fetch(appData.webhookUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    statusLabel.textContent = "✅ Successfully Saved!";
                    setTimeout(() => document.getElementById('save-modal').classList.add('hidden'), 2000);
                    return;
                } catch(e) {
                    console.log("Webhook failed, falling back to download");
                }
            }

            const reportText = `STUDENT SCORE REPORT\nName: ${payload.name}\nClass: ${payload.className}\nScore: ${payload.score} Points\nDate: ${payload.date}`;
            const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(reportText);
            const dl = document.getElementById('download-anchor');
            dl.setAttribute("href", dataStr); 
            dl.setAttribute("download", `${payload.name}_Score_Report.txt`); 
            dl.click();

            statusLabel.textContent = "✅ Report Downloaded!";
            setTimeout(() => document.getElementById('save-modal').classList.add('hidden'), 3000);
        };

        // ==========================================
        // TEACHER DASHBOARD LOGIC
        // ==========================================
        document.getElementById('btn-teacher-login').onclick = () => {
            pauseVideo();
            document.getElementById('pin-modal').classList.remove('hidden');
        };
        document.getElementById('btn-cancel-pin').onclick = () => document.getElementById('pin-modal').classList.add('hidden');
        
        document.getElementById('btn-submit-pin').onclick = () => {
            if (document.getElementById('pin-input').value === appData.pin) {
                document.getElementById('pin-modal').classList.add('hidden');
                document.getElementById('student-view').classList.add('hidden');
                document.getElementById('teacher-view').classList.remove('hidden');
                document.getElementById('pin-input').value = '';
                renderTeacherDashboard();
                loadTeacherVideoPreview();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        };

        function loadTeacherVideoPreview() {
            const vType = document.getElementById('t-video-type').value;
            const vSrc = document.getElementById('t-video-source').value;
            
            tHtml5Player.classList.add('hidden');
            document.getElementById('t-youtube-player').classList.add('hidden');

            if (vType === 'local') {
                if (ytTeacherPlayer) ytTeacherPlayer.stopVideo();
                tHtml5Player.src = vSrc;
                tHtml5Player.classList.remove('hidden');
            } else if (vType === 'youtube' && isYtApiReady) {
                tHtml5Player.pause();
                document.getElementById('t-youtube-player').classList.remove('hidden');
                if (ytTeacherPlayer) ytTeacherPlayer.loadVideoById(vSrc);
                else ytTeacherPlayer = new YT.Player('t-youtube-player', { videoId: vSrc, playerVars: {'controls':1} });
            }
        }

        function getTeacherTime() {
            const vType = document.getElementById('t-video-type').value;
            if (vType === 'local') return Math.floor(tHtml5Player.currentTime);
            if (vType === 'youtube' && ytTeacherPlayer) return Math.floor(ytTeacherPlayer.getCurrentTime());
            return 0;
        }

        document.getElementById('btn-exit-teacher').onclick = () => {
            syncDashboardToAppData(); 
            saveToLocalStorage();
            
            if(ytTeacherPlayer) ytTeacherPlayer.stopVideo();
            tHtml5Player.pause();

            document.getElementById('teacher-view').classList.add('hidden');
            document.getElementById('student-view').classList.remove('hidden');
            initVideoPlayer();
        };

        // JSON BACKUP LOGIC
        document.getElementById('btn-export-json').addEventListener('click', () => {
            syncDashboardToAppData(); 
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
            const dl = document.getElementById('download-anchor');
            dl.setAttribute("href", dataStr); dl.setAttribute("download", "video-lesson-backup.json"); dl.click();
        });

        document.getElementById('import-json').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    appData = JSON.parse(e.target.result);
                    sanitizeData();
                    saveToLocalStorage();
                    alert("Backup imported successfully!");
                    renderTeacherDashboard();
                    loadTeacherVideoPreview();
                } catch(err) { alert("Invalid backup file format."); }
            };
            reader.readAsText(file);
        });

        function renderTeacherDashboard() {
            document.getElementById('t-pin').value = appData.pin || "";
            document.getElementById('t-video-type').value = appData.videoType || "youtube";
            document.getElementById('t-video-source').value = appData.videoSource || "";
            document.getElementById('t-webhook').value = appData.webhookUrl || "";

            document.getElementById('t-ctrl-play').checked = appData.controls.playPause;
            document.getElementById('t-ctrl-rewind').checked = appData.controls.rewind;
            document.getElementById('t-ctrl-forward').checked = appData.controls.forward;

            const list = document.getElementById('questions-list');
            list.innerHTML = '';

            appData.questions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'q-box';
                
                let answerHTML = '';
                if (q.type === 'mcq') {
                    answerHTML = `
                        <label>Choices & Correct Answer (Click Radio Button):</label>
                        <div class="t-mcq-grid">
                            <div class="t-mcq-item"><input type="radio" name="q${idx}" ${q.correctAnswer===0?'checked':''} onchange="updateQ(${idx}, 'correctAnswer', 0)"> <input type="text" value="${q.options[0]}" onchange="updateOpt(${idx}, 0, this.value)"></div>
                            <div class="t-mcq-item"><input type="radio" name="q${idx}" ${q.correctAnswer===1?'checked':''} onchange="updateQ(${idx}, 'correctAnswer', 1)"> <input type="text" value="${q.options[1]}" onchange="updateOpt(${idx}, 1, this.value)"></div>
                            <div class="t-mcq-item"><input type="radio" name="q${idx}" ${q.correctAnswer===2?'checked':''} onchange="updateQ(${idx}, 'correctAnswer', 2)"> <input type="text" value="${q.options[2]}" onchange="updateOpt(${idx}, 2, this.value)"></div>
                            <div class="t-mcq-item"><input type="radio" name="q${idx}" ${q.correctAnswer===3?'checked':''} onchange="updateQ(${idx}, 'correctAnswer', 3)"> <input type="text" value="${q.options[3]}" onchange="updateOpt(${idx}, 3, this.value)"></div>
                        </div>
                    `;
                } else if (q.type === 'identification') {
                    answerHTML = `<label>Correct Answer:</label><input type="text" value="${q.correctAnswer}" onchange="updateQ(${idx}, 'correctAnswer', this.value)">`;
                }

                div.innerHTML = `
                    <div class="q-header">
                        <h4>Question ${idx + 1}</h4>
                        <button class="btn btn-danger small" onclick="deleteQ(${idx})">Delete</button>
                    </div>
                    
                    <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
                        <div style="flex:1; min-width: 150px;">
                            <label>Type:</label>
                            <select onchange="changeQType(${idx}, this.value)">
                                <option value="mcq" ${q.type === 'mcq' ? 'selected' : ''}>Multiple Choice</option>
                                <option value="identification" ${q.type === 'identification' ? 'selected' : ''}>Type Answer</option>
                                <option value="essay" ${q.type === 'essay' ? 'selected' : ''}>Any Answer (Essay)</option>
                            </select>
                        </div>
                        <div style="flex:1; min-width: 100px;">
                            <label>Show at (Sec):</label>
                            <input type="number" id="ts-${idx}" value="${q.timestamp}" onchange="updateQ(${idx}, 'timestamp', this.value)">
                        </div>
                        <div style="flex:1; min-width: 100px;">
                            <label>Max Points:</label>
                            <input type="number" value="${q.maxPoints || 10}" min="1" onchange="updateQ(${idx}, 'maxPoints', this.value)">
                        </div>
                        <button class="btn btn-gray small" onclick="grabTime(${idx})" style="height:42px; margin-top:5px;">⏱️ Get Time</button>
                    </div>

                    <div class="mt-10">
                        <label>Question Text:</label>
                        <input type="text" value="${q.text}" onchange="updateQ(${idx}, 'text', this.value)">
                    </div>
                    
                    ${answerHTML}

                    <div class="mt-10">
                        <label>Hint (Optional):</label>
                        <input type="text" value="${q.hint}" onchange="updateQ(${idx}, 'hint', this.value)">
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.grabTime = function(idx) {
            const t = getTeacherTime();
            document.getElementById(`ts-${idx}`).value = t;
            updateQ(idx, 'timestamp', t);
        }

        window.updateQ = function(idx, field, val) {
            if (field === 'timestamp' || field === 'correctAnswer' || field === 'maxPoints') appData.questions[idx][field] = parseInt(val, 10) || 0;
            else appData.questions[idx][field] = val;
            saveToLocalStorage();
        };

        window.updateOpt = function(qIdx, optIdx, val) {
            appData.questions[qIdx].options[optIdx] = val;
            saveToLocalStorage();
        }

        window.changeQType = function(idx, type) {
            appData.questions[idx].type = type;
            if (type === 'mcq') { appData.questions[idx].options = ["A", "B", "C", "D"]; appData.questions[idx].correctAnswer = 0; }
            else if (type === 'identification') appData.questions[idx].correctAnswer = "Answer";
            else appData.questions[idx].correctAnswer = "";
            saveToLocalStorage();
            renderTeacherDashboard();
        }

        window.deleteQ = function(idx) {
            appData.questions.splice(idx, 1);
            saveToLocalStorage();
            renderTeacherDashboard();
        }

        document.getElementById('btn-add-question').onclick = () => {
            appData.questions.unshift({ type: "mcq", timestamp: 0, maxPoints: 10, text: "New Question", options: ["1", "2", "3", "4"], correctAnswer: 0, hint: "" });
            saveToLocalStorage();
            renderTeacherDashboard();
        }
    </script>
</body>
</html>
