<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colour Monster Goes to School Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 8px; background-color: #000; }
        .screen { display: none; }
        .active { display: block; }
        
        /* New Layout: Question box appears cleanly below the video so it never blocks the view */
        .quiz-box { 
            display: none; 
            background: #fff9c4; 
            border: 3px solid #ffeb3b; 
            border-radius: 8px; 
            padding: 15px; 
            margin-top: 15px; 
            box-sizing: border-box; 
        }
        
        .btn { background-color: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; margin: 10px; }
        .btn:hover { background-color: #45a049; }
        .btn-nav { background-color: #2196F3; }
        .btn-nav:hover { background-color: #0b7dda; }
        .options-container { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .option-btn { background-color: #e7e7e7; color: black; width: 80%; padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .option-btn:hover { background-color: #ddd; }
        input[type="text"] { padding: 10px; font-size: 16px; width: 60%; text-align: center; margin-top: 10px; border: 2px solid #ccc; border-radius: 5px; }
        .nav-controls { margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="homepage-screen" class="screen active">
        <h2>The Colour Monster Goes to School</h2>
        <p>Type your name to start the video quiz:</p>
        <input type="text" id="student-name" placeholder="Your Name" required><br><br>
        <button class="btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="screen">
        <video id="myVideo" controls>
            <source src="your-video-file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div id="quiz-box" class="quiz-box">
            <h3 id="question-text">Question goes here</h3>
            <div id="answer-area"></div>
            <br>
            <button class="btn" id="submit-ans-btn" onclick="checkAnswer()">Submit Answer</button>
        </div>

        <div class="nav-controls">
            <button class="btn btn-nav" onclick="goBack()">◀ Back</button>
            <button class="btn btn-nav" onclick="goForward()">Forward ▶</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h2>Quiz Finished!</h2>
        <h3 id="result-text"></h3>
        
        <button class="btn" id="submit-drive-btn" onclick="sendToGoogleDrive()" style="display:none;">Send Grade to Teacher</button>
        <button class="btn" id="retry-btn" style="background-color: #f44336; display:none;" onclick="restartQuiz()">Try Again ↺</button>
    </div>
</div>

<script>
const PASSING_SCORE = 12; 
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwl0tvckL5jgitzIJts3RonQpPN15oPyAvQtClYOwJQvmJAlkeS0hU5otrPtRnuywqfvQ/exec";

const questions = [
    { id: 1, type: "id", question: "Where is the Color Monster going today?", answer: "school", time: 10 },
    { id: 2, type: "mc", question: "The Color Monster asks if school is a spooky ______.", options: ["Castle", "House", "Tree", "Box"], answer: "A", time: 25 },
    { id: 3, type: "mc", question: "What is one funny thing the Color Monster wants to pack in his rucksack?", options: ["Torch", "Banana", "Pillow", "Clock"], answer: "A", time: 40 },
    { id: 4, type: "id", question: "The boy says the monster only needs a coat and a _____.", answer: "notebook", time: 55 },
    { id: 5, type: "id", question: "The name of the teacher is Miss _____.", answer: "edwards", time: 70 },
    { id: 6, type: "mc", question: "How does the Color Monster feel when he first meets his new classmates?", options: ["Happy", "Scared", "Angry", "Sleepy"], answer: "B", time: 85 },
    { id: 7, type: "mc", question: "What is the first class in the morning?", options: ["Art", "Gym", "Music", "Math"], answer: "C", time: 100 },
    { id: 8, type: "id", question: "In music class, the monster sings out of _____.", answer: "tune", time: 115 },
    { id: 9, type: "mc", question: "What does Miss Edwards read to the class?", options: ["A map", "A letter", "A song", "A story"], answer: "D", time: 130 },
    { id: 10, type: "id", question: "At the playground, the kids want a turn on the _____.", answer: "swing", time: 145 },
    { id: 11, type: "mc", question: "Before lunch, what do the kids wash?", options: ["Feet", "Hands", "Faces", "Hair"], answer: "B", time: 160 },
    { id: 12, type: "mc", question: "What food do they eat for lunch?", options: ["Bread and soup", "Pizza and juice", "Apple and milk", "Cake and tea"], answer: "A", time: 175 },
    { id: 13, type: "id", question: "In the gym, the kids have fun jumping on the _____.", answer: "monster", time: 190 },
    { id: 14, type: "mc", question: "Why is the Color Monster the best model for painting class?", options: ["He can sit still", "He is very tall", "He can change color", "He has big eyes"], answer: "C", time: 205 },
    { id: 15, type: "id", question: "After school, the child is very tired and needs to take a _____.", answer: "nap", time: 220 }
];

let currentScore = 0;
let studentName = "";
let answeredQuestions = []; 
let activeQuestionIndex = null;
let selectedMCAnswer = "";

const video = document.getElementById("myVideo");

function startQuiz() {
    const nameInput = document.getElementById("student-name").value.trim();
    if (nameInput === "") { alert("Please enter your name first."); return; }
    studentName = nameInput;
    currentScore = 0;
    answeredQuestions = [];
    activeQuestionIndex = null;
    
    switchScreen("quiz-screen");
    video.play();
}

// --- VIDEO TIMING TRACKER ---
video.ontimeupdate = function() {
    let currentTime = Math.floor(video.currentTime);
    
    questions.forEach((q, index) => {
        // Trigger ONLY if it hasn't been answered AND it is not already the open question
        if (currentTime === q.time && !answeredQuestions.includes(index) && activeQuestionIndex !== index) {
            video.pause();
            showQuestion(index);
        }
    });
};

video.onended = function() {
    showEndScreen();
};

// --- SHOW QUESTION ---
function showQuestion(index) {
    activeQuestionIndex = index;
    const q = questions[index];
    document.getElementById("question-text").innerText = q.question;
    const answerArea = document.getElementById("answer-area");
    answerArea.innerHTML = "";

    if (q.type === "mc") {
        let labels = ["A", "B", "C", "D"];
        let html = '<div class="options-container">';
        q.options.forEach((opt, idx) => {
            // Keep previous selection highlighted if they rewound the video
            let buttonStyle = (selectedMCAnswer === labels[idx]) ? 'style="background-color: #ffeb3b;"' : '';
            html += `<button class="option-btn" id="opt-${labels[idx]}" ${buttonStyle} onclick="selectOption('${labels[idx]}')">${labels[idx]}) ${opt}</button>`;
        });
        html += '</div>';
        answerArea.innerHTML = html;
    } else if (q.type === "id") {
        answerArea.innerHTML = `<input type="text" id="id-answer-input" placeholder="Type 1 word here">`;
    }
    
    document.getElementById("quiz-box").style.display = "block";
}

function selectOption(letter) {
    selectedMCAnswer = letter;
    document.querySelectorAll('.option-btn').forEach(btn => btn.style.backgroundColor = '#e7e7e7');
    document.getElementById(`opt-${letter}`).style.backgroundColor = '#ffeb3b';
}

// --- CHECK ANSWER ---
function checkAnswer() {
    const q = questions[activeQuestionIndex];
    let isCorrect = false;

    if (q.type === "mc") {
        if (!selectedMCAnswer) { alert("Please select an option!"); return; }
        if (selectedMCAnswer === q.answer) isCorrect = true;
    } else if (q.type === "id") {
        const inputVal = document.getElementById("id-answer-input").value.trim().toLowerCase();
        if (!inputVal) { alert("Please type your answer!"); return; }
        if (inputVal === q.answer.toLowerCase()) isCorrect = true;
    }

    if (isCorrect) { currentScore++; }

    answeredQuestions.push(activeQuestionIndex);
    activeQuestionIndex = null; // Clear active status
    selectedMCAnswer = ""; // Reset temporary memory
    
    document.getElementById("quiz-box").style.display = "none";
    video.play();
}

// --- INSTANT NAVIGATION (GUIDE MODE) ---
function goBack() {
    // Rewind video instantly by 5 seconds
    video.currentTime = Math.max(0, video.currentTime - 5);
    
    // Play video immediately. 
    // Notice: We DO NOT hide the quiz box. It stays perfectly visible to guide them!
    video.play();
}

function goForward() {
    let nextUnansweredTime = 999999;
    questions.forEach((q, index) => {
        if (!answeredQuestions.includes(index) && q.time < nextUnansweredTime) {
            nextUnansweredTime = q.time;
        }
    });

    if (video.currentTime + 5 >= nextUnansweredTime) {
        video.currentTime = nextUnansweredTime - 0.5; 
    } else {
        video.currentTime += 5;
    }
}

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function showEndScreen() {
    document.getElementById("quiz-box").style.display = "none";
    switchScreen("end-screen");
    const resultText = document.getElementById("result-text");
    const submitBtn = document.getElementById("submit-drive-btn");
    const retryBtn = document.getElementById("retry-btn");

    if (currentScore >= PASSING_SCORE) {
        resultText.innerHTML = `Great job! You passed!<br>Score: <strong>${currentScore} / 15</strong>`;
        submitBtn.style.display = "inline-block";
        retryBtn.style.display = "none";
    } else {
        resultText.innerHTML = `You got <strong>${currentScore} / 15</strong>.<br>You need ${PASSING_SCORE} to pass. Please try again!`;
        submitBtn.style.display = "none";
        retryBtn.style.display = "inline-block";
    }
}

function sendToGoogleDrive() {
    const submitBtn = document.getElementById("submit-drive-btn");
    submitBtn.innerText = "Sending...";
    submitBtn.disabled = true;

    const formData = new URLSearchParams();
    formData.append("name", studentName);
    formData.append("score", currentScore);
    formData.append("total", questions.length);
    formData.append("status", "PASSED");

    fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: formData,
        mode: "no-cors"
    })
    .then(() => {
        alert("Success! Your score was sent to the teacher.");
        restartQuiz();
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Something went wrong. Please ask the teacher for help.");
        submitBtn.innerText = "Send Grade to Teacher";
        submitBtn.disabled = false;
    });
}

function restartQuiz() {
    document.getElementById("student-name").value = "";
    document.getElementById("quiz-box").style.display = "none";
    switchScreen("homepage-screen");
}
</script>

</body>
</html>
